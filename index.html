<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>荣誉奖牌</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #fbfaf7;
      --text: #1f1a15;
      --muted: #6f6256;
      --line: #e4dacd;
      --accent: #8b5e25;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      line-height: 1.2;
    }
    p {
      color: var(--muted);
    }
    a {
      color: var(--accent);
      font-weight: 700;
    }
    .links {
      display: grid;
      gap: 12px;
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <main>
    <h1>荣誉奖牌</h1>
    <p>荣誉奖牌是一款用于收藏、整理和展示个人奖牌的 iPhone App。</p>
    <div class="links">
      <a href="./privacy-policy/">隐私政策</a>
      <a href="./support/">支持与反馈</a>
      <a href="https://github.com/RunfengLin815/medalest/issues">提交反馈</a>
    </div>
  </main>
</body>
</html>
